name: Specmatic Contract Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  contract-tests:
    name: Run Specmatic Contract & Workflow Tests
    runs-on: ubuntu-latest

    steps:
      # ─── Step 1: Checkout the repository ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Step 2: Set up Node.js ──────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ─── Step 3: Set up Java (required by Specmatic JAR) ────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ─── Step 4: Install workspace dependencies ──────────────────────────────
      - name: Install workspace dependencies
        run: npm install

      # ─── Step 5: Build backend TypeScript ────────────────────────────────────
      - name: Build backend
        run: npm run build:backend

      # ─── Step 6: Validate all Specmatic examples (inline + external) ─────────
      - name: Validate Specmatic examples
        working-directory: backend
        run: npx specmatic examples validate --spec-file=contracts/api.yaml

      # ─── Step 7: Run language-native Jest contract & workflow tests ──────────
      #             This starts the backend server programmatically, runs
      #             Specmatic contract tests, resiliency (generative) tests,
      #             and the sequential user journey.
      - name: Run Jest contract & workflow tests (incl. resiliency)
        working-directory: backend
        run: npm run test:contract
        env:
          SPECMATIC_GENERATIVE_TESTS: "true"

      # ─── Step 8: Start backend server and run CLI Specmatic contract tests ───
      - name: Start backend server
        working-directory: backend
        run: node dist/server.js &
        env:
          PORT: 3000
          NODE_ENV: test

      - name: Wait for backend to be ready
        run: |
          for i in {1..15}; do
            if curl -sf http://localhost:3000/ > /dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/15)"
            sleep 2
          done

      - name: Run Specmatic CLI contract & resiliency tests
        working-directory: backend
        run: npx specmatic test --host=localhost --port=3000
        env:
          SPECMATIC_GENERATIVE_TESTS: "true"

      # ─── Step 9: Run Specmatic Arazzo workflow tests ─────────────────────────
      - name: Run Arazzo workflow tests
        working-directory: backend
        run: docker run --rm --network host --add-host host.docker.internal:127.0.0.1 -v ${{ github.workspace }}/backend:/usr/src/app specmatic/enterprise:1.20.1 test workflow/DenaAnalyticsJourney.arazzo.yaml --host=localhost --port=3000

      # ─── Step 10: Upload test reports ────────────────────────────────────────
      - name: Upload Specmatic HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: specmatic-test-report
          path: backend/build/reports/specmatic/
          retention-days: 14
