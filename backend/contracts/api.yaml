openapi: 3.0.1
info:
  title: Dena Analytics API
  version: 1.0.0
servers:
- url: http://host.docker.internal:3000
paths:
  /api/auth/login:
    post:
      operationId: loginUser
      summary: Login User
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - username
              - password
              properties:
                username:
                  type: string
                password:
                  type: string
            examples:
              validLogin:
                value:
                  username: admin
                  password: admin123
              invalidLogin:
                value:
                  username: wrong
                  password: wrong
              loginUser_application_json_200_application_json_1:
                $ref: '#/components/examples/loginUser_application_json_200_application_json_1_request'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      username:
                        type: string
              examples:
                validLogin:
                  value:
                    message: Login successful
                    token: sample-token
                    user:
                      id: 1
                      username: admin
                loginUser_application_json_200_application_json_1:
                  $ref: '#/components/examples/loginUser_application_json_200_application_json_1_response'
        '401':
          description: Invalid username or password
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                invalidLogin:
                  value:
                    error: Invalid username or password
        '400':
          description: Bad Request
          headers:
            X-Powered-By:
              required: true
              schema:
                type: string
            Connection:
              required: true
              schema:
                type: string
            Keep-Alive:
              required: true
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Api_Auth_Login_POST_400_application_json_ResponseBody'
  /api/dashboards:
    get:
      operationId: getDashboards
      summary: Get Dashboards
      responses:
        '200':
          description: Dashboard List
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - name
                  - category
                  - powerBiUrl
                  - lastUpdated
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    category:
                      type: string
                    powerBiUrl:
                      type: string
                      format: uri
                    lastUpdated:
                      type: string
                      format: date-time
  /api/dashboards/{id}:
    get:
      operationId: getDashboardById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          example: 1
        examples:
          dashboard1:
            value: 1
          dashboardNotFound:
            value: 999
      responses:
        '200':
          description: Dashboard
          content:
            application/json:
              schema:
                type: object
                required:
                - id
                - name
                - category
                - powerBiUrl
                - lastUpdated
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  category:
                    type: string
                  powerBiUrl:
                    type: string
                    format: uri
                  lastUpdated:
                    type: string
                    format: date-time
              examples:
                dashboard1:
                  value:
                    id: 1
                    name: Census & Population Demographics
                    category: census
                    powerBiUrl: https://example.com
                    lastUpdated: '2026-06-08T10:00:00Z'
        '404':
          description: Dashboard not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                dashboardNotFound:
                  value:
                    error: Dashboard with ID 999 not found
        '400':
          description: Bad Request
          headers:
            X-Powered-By:
              required: true
              schema:
                type: string
            Connection:
              required: true
              schema:
                type: string
            Keep-Alive:
              required: true
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Api_Dashboards_True_GET_400_application_json_ResponseBody'
  /api/analytics/{category}:
    get:
      operationId: getAnalytics
      parameters:
      - name: category
        in: path
        required: true
        schema:
          type: string
        examples:
          validCategory:
            value: census
          invalidCategory:
            value: invalid
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                  - id
                  - category
                  - metricName
                  - metricValue
                  properties:
                    id:
                      type: integer
                    category:
                      type: string
                    metricName:
                      type: string
                    metricValue:
                      type: number
              examples:
                validCategory:
                  value:
                  - id: 1
                    category: census
                    metricName: Population
                    metricValue: 1500000
        '400':
          description: Validation Error
          content:
            application/json:
              schema:
                type: object
                required:
                - error
                - details
                properties:
                  error:
                    type: string
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        message:
                          type: string
              examples:
                invalidCategory:
                  value:
                    error: Validation Error
                    details:
                    - field: category
                      message: Category must be one of the following
  /api/insights:
    post:
      operationId: generateInsights
      security:
      - bearerAuth: [
          ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - category
              properties:
                category:
                  type: string
            examples:
              validInsight:
                value:
                  category: census
      responses:
        '200':
          description: Insight Generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  category:
                    type: string
                  summary:
                    type: string
                  keyTakeaways:
                    type: array
                    items:
                      type: string
                  recommendations:
                    type: array
                    items:
                      type: string
                  analyzedBy:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '401':
          description: Unauthorized
          headers:
            X-Powered-By:
              required: true
              schema:
                type: string
            Connection:
              required: true
              schema:
                type: string
            Keep-Alive:
              required: true
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Api_Insights_POST_401_application_json_ResponseBody'
        '400':
          description: Bad Request
          headers:
            X-Powered-By:
              required: true
              schema:
                type: string
            Connection:
              required: true
              schema:
                type: string
            Keep-Alive:
              required: true
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Api_Insights_POST_400_application_json_ResponseBody'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  examples:
    loginUser_application_json_200_application_json_1_request:
      value:
        username: mikel.brown
        password: '111111'
    loginUser_application_json_200_application_json_1_response:
      value:
        message: optio
        token: qui
        user:
          id: 143
          username: tiara.satterfield
  schemas:
    Api_Insights_POST_application_json_RequestBody:
      required:
      - category
      type: object
      properties:
        category:
          type: string
    Api_Insights_POST_401_application_json_ResponseBody:
      required:
      - error
      type: object
      properties:
        error:
          type: string
    Details:
      required:
      - field
      - message
      type: object
      properties:
        field:
          type: string
        message:
          type: string
    Api_Auth_Login_POST_400_application_json_ResponseBody:
      required:
      - details
      - error
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/Details'
    Api_Auth_Login_POST_application_json_RequestBody:
      required:
      - password
      - username
      type: object
      properties:
        username:
          type: integer
          nullable: true
        password:
          type: string
          nullable: true
    Api_Dashboards_True_GET_400_application_json_ResponseBody:
      required:
      - details
      - error
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/Details'
    Api_Dashboards_HQCFW_GET_400_application_json_ResponseBody:
      required:
      - details
      - error
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/Details'
    Api_Dashboards_TXUJQ_GET_400_application_json_ResponseBody:
      required:
      - details
      - error
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/Details'
    Api_Insights_POST_400_application_json_ResponseBody:
      required:
      - details
      - error
      type: object
      properties:
        error:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/Details'
